<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Hues Of Life Anu logo</title>
  <desc id="desc">A transparent logo mark with the Sinhala word Anu.</desc>
  <defs>
    <radialGradient id="innerGlow" cx="34%" cy="20%" r="82%">
      <stop offset="0" stop-color="#25437d"/>
      <stop offset="0.55" stop-color="#081632"/>
      <stop offset="1" stop-color="#020713"/>
    </radialGradient>
    <linearGradient id="goldGradient" x1="60" y1="54" x2="197" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4be"/>
      <stop offset="0.46" stop-color="#e3b957"/>
      <stop offset="1" stop-color="#9f7024"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="165%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#0c1f55" flood-opacity="0.34"/>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="102" fill="url(#innerGlow)" filter="url(#softShadow)"/>
  <circle cx="128" cy="128" r="92" fill="none" stroke="url(#goldGradient)" stroke-width="3"/>
  <circle cx="128" cy="128" r="72" fill="none" stroke="#dcb65a" stroke-width="1.5" opacity="0.55"/>
  <path d="M65 82c23 8 44 8 63 0 21-9 42-5 63 9-11 14-25 22-41 24-17 2-32-3-48-1-15 1-28 8-37 19V82Z" fill="#ffffff" opacity="0.08"/>
  <text x="128" y="142" text-anchor="middle" dominant-baseline="middle" fill="url(#goldGradient)" font-family="'Noto Sans Sinhala', 'Iskoola Pota', sans-serif" font-size="70" font-weight="700">අනූ</text>
  <path d="M76 52c-3 14-11 22-25 25 14 3 22 11 25 25 3-14 11-22 25-25-14-3-22-11-25-25Z" fill="#f3d984"/>
  <circle cx="188" cy="70" r="5.5" fill="#f3d984"/>
</svg>
